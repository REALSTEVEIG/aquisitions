services:
  neon-local:
    image: neondatabase/neon_local:latest
    ports:
      - '5432:5432'
    env_file:
      - .env.development
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -p 5432 -U neon || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      target: development
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    env_file:
      - .env.development
    environment:
      - NEON_LOCAL=true
      - DATABASE_URL=postgres://neon:npg@neon-local:5432/neondb
    volumes:
      - ./src:/app/src
      - ./drizzle:/app/drizzle
      - ./drizzle.config.js:/app/drizzle.config.js
    depends_on:
      neon-local:
        condition: service_healthy
