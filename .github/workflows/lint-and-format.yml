name: Lint & Format

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        id: lint
        continue-on-error: true

      - name: Run Prettier check
        run: npm run format:check
        id: format
        continue-on-error: true

      - name: Annotate lint failures
        if: steps.lint.outcome == 'failure'
        run: |
          echo "::error::ESLint found issues. Run 'npm run lint:fix' locally to auto-fix."
          exit 1

      - name: Annotate format failures
        if: steps.format.outcome == 'failure'
        run: |
          echo "::error::Prettier found formatting issues. Run 'npm run format' locally to auto-fix."
          exit 1
